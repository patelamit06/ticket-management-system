name: Deploy Backend to AWS EC2 PROD

# Builds the NestJS API image, pushes it to GHCR, then SSHes into the EC2 box to
# pull the new image and roll the backend container. Postgres keeps running.
on:
  push:
    branches: [main]
    paths:
      - "ticket-backend/**"
      - ".github/workflows/deploy-aws-prod.yml"
  workflow_dispatch: {}

env:
  # ghcr.io/<owner>/ticket-backend  (owner is lowercased below)
  IMAGE_NAME: ticket-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name + tag
        id: meta
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"   # lowercase
          echo "image=ghcr.io/${OWNER}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ticket-backend
          file: ./ticket-backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + nginx config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "ticket-backend/docker-compose.prod.yml,ticket-backend/nginx/nginx.conf"
          target: "/opt/ticket"
          strip_components: 1

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_IMAGE: ${{ needs.build-and-push.outputs.image }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.tag }}
          EC2_DOMAIN: ${{ secrets.EC2_DOMAIN }}
          BACKEND_ENV: ${{ secrets.BACKEND_ENV_PRODUCTION }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GHCR_IMAGE,IMAGE_TAG,EC2_DOMAIN,BACKEND_ENV,GHCR_ACTOR,GHCR_TOKEN
          script: |
            set -e
            cd /opt/ticket

            # 1. Write the application .env from the GitHub secret, then append the
            #    image coordinates the compose file needs.
            printf '%s\n' "$BACKEND_ENV" > .env
            {
              echo ""
              echo "GHCR_IMAGE=$GHCR_IMAGE"
              echo "IMAGE_TAG=$IMAGE_TAG"
            } >> .env

            # 2. Install/refresh the nginx site config and reload (no downtime).
            sudo cp /opt/ticket/nginx/nginx.conf /etc/nginx/conf.d/ticket.conf
            sudo nginx -t && sudo systemctl reload nginx

            # 3. Authenticate to GHCR (the package is private) and pull the new
            #    image. GHCR_TOKEN is the workflow's GITHUB_TOKEN (packages: read),
            #    valid for this run — no long-lived secret needed.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            docker pull "$GHCR_IMAGE:$IMAGE_TAG"
            docker compose -f docker-compose.prod.yml up -d postgres
            docker compose -f docker-compose.prod.yml up -d backend

            # 4. Wait for the API to report healthy.
            echo "Waiting for backend health..."
            for i in $(seq 1 30); do
              status=$(docker inspect --format='{{.State.Health.Status}}' ticket-backend 2>/dev/null || echo missing)
              if [ "$status" = "healthy" ]; then echo "backend healthy"; break; fi
              if [ "$i" = "30" ]; then
                echo "backend did not become healthy:"; docker compose -f docker-compose.prod.yml logs --tail=80 backend; exit 1
              fi
              sleep 5
            done

            # 5. Clean up dangling images.
            docker image prune -f
