services:
  postgres:
    image: postgres:15
    container_name: postgres_ticket_db
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata_project2:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio_ticket
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API (presigned URLs, backend)
      - "9001:9001"   # Web console (browser UI)
    volumes:
      - minio_data:/data

volumes:
  pgdata_project2:
  minio_data:
