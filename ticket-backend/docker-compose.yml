services:
  postgres:
    image: postgres:15
    container_name: postgres_ticket_db
    environment:
      POSTGRES_DB: ticket_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata_project2:/var/lib/postgresql/data

# Object storage is AWS S3 (managed) — no local storage container. The backend
# talks to S3 directly via the AWS SDK using the AWS_*/S3_* env vars in .env.

volumes:
  pgdata_project2:
