# Nginx reverse proxy for the ticket backend (runs on the EC2 HOST).
# Place at /etc/nginx/conf.d/ticket.conf
#
#   api.tikitlo.com    -> NestJS API   (127.0.0.1:3001)
#
# Object storage is AWS S3 — the browser uploads (presigned PUT) and reads media
# directly from S3, so nginx does NOT proxy storage. No media server block here.
#
# Certbot (--nginx) rewrites this block to add the SSL listen 443 lines and the
# certificate paths. The HTTP->HTTPS redirect is also added by certbot.

# ---------- API ----------
server {
    listen 80;
    server_name api.tikitlo.com;

    # Allow large media metadata / form posts; raise if you proxy uploads.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Stripe/Swish webhooks must reach the app with the body intact.
        proxy_request_buffering off;
        proxy_read_timeout 60s;
    }
}
