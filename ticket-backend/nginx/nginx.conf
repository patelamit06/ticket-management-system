# Nginx reverse proxy for the ticket backend (runs on the EC2 HOST).
# Deployed to /etc/nginx/conf.d/ticket.conf by the GitHub Actions workflow.
#
#   api.tikitlo.com    -> NestJS API   (127.0.0.1:3001)
#
# Object storage is AWS S3 — the browser uploads (presigned PUT) and reads media
# directly from S3, so nginx does NOT proxy storage. No media server block here.
#
# IMPORTANT: This file is the source of truth and INCLUDES the TLS (443) block.
# The deploy copies it over /etc/nginx/conf.d/ticket.conf on every run, so it
# must already contain the SSL config — otherwise each deploy would revert the
# host to HTTP-only and break https://api.tikitlo.com until certbot is re-run.
#
# Certbot's job is now only to OBTAIN/RENEW the certificate files referenced
# below; it no longer needs to edit this config. The cert + these helper files
# must exist on the host before the first deploy that ships this config:
#   sudo certbot --nginx -d api.tikitlo.com        # one-time issue
# Renewals then happen automatically via the `certbot.timer` systemd unit
# (verify: `systemctl list-timers | grep certbot`).

# ---------- API (HTTPS) ----------
server {
    listen 443 ssl;
    server_name api.tikitlo.com;

    ssl_certificate     /etc/letsencrypt/live/api.tikitlo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tikitlo.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow large media metadata / form posts; raise if you proxy uploads.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Stripe/Swish webhooks must reach the app with the body intact.
        proxy_request_buffering off;
        proxy_read_timeout 60s;
    }
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    server_name api.tikitlo.com;

    # Let certbot's http-01 challenge through during renewals.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
